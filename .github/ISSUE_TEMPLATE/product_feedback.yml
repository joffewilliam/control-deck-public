name: Product feedback
description: Tell us what worked, what did not, and what would improve Control Deck.
title: "[feedback] "
labels: ["type:feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Control Deck. **Do not paste API keys, tokens,
        license keys, private prompts, customer data, or terminal transcripts.**
  - type: textarea
    id: workflow
    attributes:
      label: What were you trying to do?
    validations:
      required: true
  - type: textarea
    id: useful
    attributes:
      label: What felt useful?
    validations:
      required: false
  - type: textarea
    id: confusing
    attributes:
      label: What felt confusing or unreliable?
    validations:
      required: false
  - type: textarea
    id: blocked
    attributes:
      label: Did anything block you?
    validations:
      required: false
  - type: checkboxes
    id: providers
    attributes:
      label: Provider CLIs you used
      options:
        - label: Claude
        - label: Codex
        - label: Cursor
        - label: OpenCode
        - label: Other
